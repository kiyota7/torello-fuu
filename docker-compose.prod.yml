services:
  backend:
    build: ./backend
    container_name: taskboard-backend
    restart: unless-stopped
    environment:
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

  frontend:
    build: ./frontend
    container_name: taskboard-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
